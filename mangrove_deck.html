<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Flight Checks — Stephan Becker | Mangrove Case Study</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0f0d;
      --bg-secondary: #0d1412;
      --bg-card: #111c18;
      --bg-card-hover: #162420;
      --bg-card-alt: #0f1a16;
      --text-primary: #e8f0ec;
      --text-secondary: #94b0a4;
      --text-muted: #5a7a6c;
      --accent: #10b981;
      --accent-light: #34d399;
      --accent-glow: rgba(16, 185, 129, 0.12);
      --accent-glow-strong: rgba(16, 185, 129, 0.25);
      --teal: #14b8a6;
      --teal-glow: rgba(20, 184, 166, 0.15);
      --amber: #f59e0b;
      --amber-glow: rgba(245, 158, 11, 0.12);
      --red: #ef4444;
      --red-glow: rgba(239, 68, 68, 0.12);
      --red-muted: #dc2626;
      --blue: #3b82f6;
      --blue-glow: rgba(59, 130, 246, 0.12);
      --purple: #a78bfa;
      --border: rgba(148, 176, 164, 0.08);
      --border-accent: rgba(16, 185, 129, 0.2);
      --gradient-main: linear-gradient(135deg, #10b981 0%, #14b8a6 100%);
      --gradient-dark: linear-gradient(135deg, #0a0f0d 0%, #0d1916 40%, #0a120f 100%);
      --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-snap-type: y proximity; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 40px;
    }

    @media (max-width: 768px) {
      .slide { padding: 60px 20px; }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .fade-in-delay-1 { transition-delay: 0.1s; }
    .fade-in-delay-2 { transition-delay: 0.2s; }
    .fade-in-delay-3 { transition-delay: 0.3s; }
    .fade-in-delay-4 { transition-delay: 0.4s; }
    .fade-in-delay-5 { transition-delay: 0.5s; }
    .fade-in-delay-6 { transition-delay: 0.6s; }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
      50% { box-shadow: 0 0 40px var(--accent-glow-strong); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes scan-line {
      0% { top: 0; }
      100% { top: 100%; }
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes draw-line {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes count-up {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================================================
    // HOOKS
    // ========================================================================

    function useIntersection(options = {}) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setVisible(true);
            observer.unobserve(entry.target);
          }
        }, { threshold: 0.12, ...options });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return [ref, visible];
    }

    function useKeyboardNav(slideIds) {
      const [currentSlide, setCurrentSlide] = useState(0);

      useEffect(() => {
        const handleKey = (e) => {
          if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'PageDown') {
            e.preventDefault();
            setCurrentSlide(prev => {
              const next = Math.min(prev + 1, slideIds.length - 1);
              document.getElementById(slideIds[next])?.scrollIntoView({ behavior: 'smooth' });
              return next;
            });
          }
          if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
            e.preventDefault();
            setCurrentSlide(prev => {
              const next = Math.max(prev - 1, 0);
              document.getElementById(slideIds[next])?.scrollIntoView({ behavior: 'smooth' });
              return next;
            });
          }
          if (e.key === 'Home') {
            e.preventDefault();
            setCurrentSlide(0);
            document.getElementById(slideIds[0])?.scrollIntoView({ behavior: 'smooth' });
          }
          if (e.key === 'End') {
            e.preventDefault();
            const last = slideIds.length - 1;
            setCurrentSlide(last);
            document.getElementById(slideIds[last])?.scrollIntoView({ behavior: 'smooth' });
          }
        };

        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [slideIds]);

      // Track scroll position to update current slide
      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const idx = slideIds.indexOf(entry.target.id);
              if (idx !== -1) setCurrentSlide(idx);
            }
          });
        }, { threshold: 0.35 });

        slideIds.forEach(id => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });

        return () => observer.disconnect();
      }, [slideIds]);

      return currentSlide;
    }

    // ========================================================================
    // SLIDE IDS
    // ========================================================================

    const SLIDE_IDS = [
      'title',
      'problem',
      'evidence',
      'framework',
      'solution',
      'userflow',
      'architecture',
      'datamodel',
      'risks',
      'launch',
      'scope',
      'emerging',
      'gtm',
      'metrics',
      'demo',
      'thankyou',
    ];

    const SLIDE_LABELS = [
      'Title',
      'Problem',
      'Evidence',
      'Framework',
      'Solution',
      'User Flow',
      'Architecture',
      'Data Model',
      'Risks',
      'Launch Plan',
      'Scope',
      'Emerging',
      'GTM',
      'Metrics',
      'Demo',
      'Thank You',
    ];

    // ========================================================================
    // SHARED COMPONENTS
    // ========================================================================

    function SlideNumber({ number, total }) {
      return (
        <div style={{
          position: 'absolute', bottom: 24, right: 40,
          fontSize: 13, fontFamily: 'var(--font-mono)',
          color: 'var(--text-muted)', letterSpacing: 1,
        }}>
          {String(number).padStart(2, '0')} / {String(total).padStart(2, '0')}
        </div>
      );
    }

    function SectionLabel({ text, color }) {
      return (
        <div style={{
          display: 'inline-block',
          padding: '4px 14px',
          borderRadius: 4,
          background: color ? `${color}15` : 'var(--accent-glow)',
          border: `1px solid ${color || 'var(--accent)'}40`,
          color: color || 'var(--accent)',
          fontSize: 11,
          fontWeight: 700,
          letterSpacing: 2.5,
          textTransform: 'uppercase',
          fontFamily: 'var(--font-mono)',
          marginBottom: 16,
        }}>
          {text}
        </div>
      );
    }

    function SlideTitle({ children }) {
      return (
        <h2 style={{
          fontSize: 'clamp(28px, 4.5vw, 48px)',
          fontWeight: 800,
          lineHeight: 1.1,
          marginBottom: 8,
          letterSpacing: '-0.02em',
          color: 'var(--text-primary)',
        }}>
          {children}
        </h2>
      );
    }

    function SlideSubtitle({ children }) {
      return (
        <p style={{
          fontSize: 'clamp(15px, 2vw, 19px)',
          color: 'var(--text-secondary)',
          lineHeight: 1.6,
          maxWidth: 720,
          marginBottom: 32,
        }}>
          {children}
        </p>
      );
    }

    function Callout({ children, icon, color, style: extraStyle }) {
      const c = color || 'var(--accent)';
      return (
        <div style={{
          background: `${c}08`,
          borderLeft: `3px solid ${c}`,
          padding: '16px 20px',
          borderRadius: '0 8px 8px 0',
          fontSize: 15,
          color: 'var(--text-secondary)',
          lineHeight: 1.7,
          fontStyle: 'italic',
          ...extraStyle,
        }}>
          {icon && <span style={{ marginRight: 8, fontStyle: 'normal' }}>{icon}</span>}
          {children}
        </div>
      );
    }

    function Card({ children, style: extraStyle, hoverable, glow }) {
      const [hovered, setHovered] = useState(false);
      return (
        <div
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            background: hovered && hoverable ? 'var(--bg-card-hover)' : 'var(--bg-card)',
            borderRadius: 12,
            padding: 24,
            border: `1px solid ${hovered && hoverable ? 'var(--border-accent)' : 'var(--border)'}`,
            transition: 'all 0.3s ease',
            ...(glow && hovered ? { boxShadow: '0 0 24px var(--accent-glow)' } : {}),
            ...extraStyle,
          }}
        >
          {children}
        </div>
      );
    }

    function StatusBadge({ type, label }) {
      const configs = {
        pass: { bg: '#10b98118', border: '#10b98140', color: '#10b981', icon: '\u2713' },
        fail: { bg: '#ef444418', border: '#ef444440', color: '#ef4444', icon: '\u2717' },
        warn: { bg: '#f59e0b18', border: '#f59e0b40', color: '#f59e0b', icon: '\u26A0' },
        info: { bg: '#3b82f618', border: '#3b82f640', color: '#3b82f6', icon: '\u2139' },
      };
      const c = configs[type] || configs.info;
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 5,
          padding: '3px 10px', borderRadius: 4,
          background: c.bg, border: `1px solid ${c.border}`,
          color: c.color, fontSize: 12, fontWeight: 600,
          fontFamily: 'var(--font-mono)',
        }}>
          {c.icon} {label}
        </span>
      );
    }

    // ========================================================================
    // NAV SIDEBAR
    // ========================================================================

    function NavSidebar({ currentSlide }) {
      return (
        <nav style={{
          position: 'fixed', left: 16, top: '50%', transform: 'translateY(-50%)',
          zIndex: 1000, display: 'flex', flexDirection: 'column', gap: 4,
        }}>
          {SLIDE_IDS.map((id, i) => (
            <a
              key={id}
              href={`#${id}`}
              title={SLIDE_LABELS[i]}
              style={{
                width: currentSlide === i ? 28 : 8,
                height: 8,
                borderRadius: 4,
                background: currentSlide === i ? 'var(--accent)' : 'var(--text-muted)',
                opacity: currentSlide === i ? 1 : 0.3,
                transition: 'all 0.3s ease',
                display: 'block',
              }}
            />
          ))}
        </nav>
      );
    }

    // ========================================================================
    // SLIDE 1: TITLE
    // ========================================================================

    function TitleSlide() {
      const [ref, visible] = useIntersection();
      return (
        <section id="title" className="slide" style={{
          background: 'var(--gradient-dark)',
          justifyContent: 'center',
          alignItems: 'center',
          textAlign: 'center',
          position: 'relative',
          overflow: 'hidden',
        }}>
          {/* Subtle grid background */}
          <div style={{
            position: 'absolute', inset: 0, opacity: 0.03,
            backgroundImage: 'linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90deg, var(--accent) 1px, transparent 1px)',
            backgroundSize: '60px 60px',
            pointerEvents: 'none',
          }} />

          {/* Radial glow */}
          <div style={{
            position: 'absolute', top: '40%', left: '50%', transform: 'translate(-50%, -50%)',
            width: 600, height: 600, borderRadius: '50%',
            background: 'radial-gradient(circle, var(--accent-glow) 0%, transparent 70%)',
            pointerEvents: 'none', filter: 'blur(40px)',
          }} />

          <div ref={ref} style={{ position: 'relative', zIndex: 1, maxWidth: 900 }}>
            <div className={`fade-in ${visible ? 'visible' : ''}`}>
              <div style={{
                display: 'inline-block', padding: '6px 18px', borderRadius: 4,
                border: '1px solid var(--border-accent)',
                background: 'var(--accent-glow)',
                marginBottom: 32,
              }}>
                <span style={{
                  fontSize: 12, fontWeight: 600, letterSpacing: 3,
                  textTransform: 'uppercase', color: 'var(--accent)',
                  fontFamily: 'var(--font-mono)',
                }}>
                  Product Lead Case Study
                </span>
              </div>
            </div>

            <h1 className={`fade-in fade-in-delay-1 ${visible ? 'visible' : ''}`} style={{
              fontSize: 'clamp(32px, 5.5vw, 64px)',
              fontWeight: 900,
              lineHeight: 1.05,
              letterSpacing: '-0.03em',
              marginBottom: 16,
            }}>
              <span style={{ color: 'var(--text-primary)' }}>Pre-Flight Checks:</span><br/>
              <span style={{
                background: 'linear-gradient(135deg, var(--accent) 0%, var(--teal) 50%, var(--accent-light) 100%)',
                backgroundSize: '200% 200%',
                animation: 'shimmer 6s linear infinite',
                WebkitBackgroundClip: 'text',
                WebkitTextFillColor: 'transparent',
                backgroundClip: 'text',
              }}>
                Catching Verification Issues{' '}
              </span>
              <br/>
              <span style={{ color: 'var(--text-primary)' }}>Before They Cost You</span>
            </h1>

            <p className={`fade-in fade-in-delay-2 ${visible ? 'visible' : ''}`} style={{
              fontSize: 'clamp(16px, 2.2vw, 21px)',
              color: 'var(--text-secondary)',
              fontWeight: 300,
              marginBottom: 48,
              lineHeight: 1.5,
            }}>
              A Quality Intelligence System for Carbon Removal Reporting
            </p>

            <div className={`fade-in fade-in-delay-3 ${visible ? 'visible' : ''}`} style={{
              display: 'flex', justifyContent: 'center', gap: 32,
              fontSize: 14, color: 'var(--text-muted)',
              flexWrap: 'wrap',
            }}>
              <span style={{ fontWeight: 600, color: 'var(--text-secondary)' }}>Stephan Becker</span>
              <span style={{ color: 'var(--border-accent)' }}>|</span>
              <span>Product Lead Case Study</span>
              <span style={{ color: 'var(--border-accent)' }}>|</span>
              <span>March 2026</span>
            </div>

            <div className={`fade-in fade-in-delay-4 ${visible ? 'visible' : ''}`} style={{
              marginTop: 64,
              fontSize: 13,
              color: 'var(--text-muted)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            }}>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11 }}>
                Use arrow keys to navigate
              </span>
              <span style={{
                display: 'inline-flex', alignItems: 'center', gap: 4,
              }}>
                <span style={{
                  display: 'inline-block', padding: '2px 8px', borderRadius: 3,
                  border: '1px solid var(--border)', fontSize: 11,
                  fontFamily: 'var(--font-mono)',
                }}>{'\u2190'}</span>
                <span style={{
                  display: 'inline-block', padding: '2px 8px', borderRadius: 3,
                  border: '1px solid var(--border)', fontSize: 11,
                  fontFamily: 'var(--font-mono)',
                }}>{'\u2192'}</span>
              </span>
            </div>
          </div>
          <SlideNumber number={1} total={16} />
        </section>
      );
    }

    // ========================================================================
    // SLIDE 2: THE PROBLEM
    // ========================================================================

    function ProblemSlide() {
      const [ref, visible] = useIntersection();

      const timelineSteps = [
        { label: 'Submit Data', color: 'var(--accent)', icon: '\u2191' },
        { label: 'Auditor Review', color: 'var(--amber)', icon: '\u23F3' },
        { label: 'NCR Issued', color: 'var(--red)', icon: '\u2717' },
        { label: 'Corrective Action', color: 'var(--amber)', icon: '\u21BB' },
        { label: 'Re-Submit', color: 'var(--accent)', icon: '\u2191' },
        { label: 'Second Review', color: 'var(--amber)', icon: '\u23F3' },
        { label: 'Conditional Pass', color: 'var(--amber)', icon: '\u2713' },
      ];

      const preflightSteps = [
        { label: 'Pre-Flight Check', color: 'var(--accent)', icon: '\u2713' },
        { label: 'Fix Flagged Issues', color: 'var(--accent-light)', icon: '\u270E' },
        { label: 'Submit Clean Data', color: 'var(--accent)', icon: '\u2191' },
        { label: 'Auditor Review', color: 'var(--accent)', icon: '\u23F3' },
        { label: 'Approved', color: 'var(--accent)', icon: '\u2713' },
      ];

      return (
        <section id="problem" className="slide" ref={ref}>
          <div style={{ maxWidth: 1100, margin: '0 auto', width: '100%' }}>
            <div className={`fade-in ${visible ? 'visible' : ''}`}>
              <SectionLabel text="The Problem" />
              <SlideTitle>The Latency of Trust</SlideTitle>
              <SlideSubtitle>
                When carbon removal projects submit data for verification, they are flying blind.
                The result is a costly game of ping-pong that delays credit issuance by weeks or months.
              </SlideSubtitle>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20, marginBottom: 40 }}>
              {[
                { num: '3-6', unit: 'months', desc: 'Average verification cycle time', color: 'var(--red)' },
                { num: '2.4x', unit: 'avg', desc: 'Submissions before passing audit', color: 'var(--amber)' },
                { num: '68%', unit: '', desc: 'First submissions receive NCRs', color: 'var(--amber)' },
              ].map((stat, i) => (
                <div key={i} className={`fade-in fade-in-delay-${i+1} ${visible ? 'visible' : ''}`}>
                  <Card>
                    <div style={{ fontSize: 36, fontWeight: 800, color: stat.color, fontFamily: 'var(--font-mono)' }}>
                      {stat.num}<span style={{ fontSize: 16, fontWeight: 400, color: 'var(--text-muted)' }}> {stat.unit}</span>
                    </div>
                    <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 6 }}>{stat.desc}</div>
                  </Card>
                </div>
              ))}
            </div>

            {/* Timeline comparison */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
              <div className={`fade-in fade-in-delay-3 ${visible ? 'visible' : ''}`}>
                <Card style={{ padding: 20 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: 'var(--red)', marginBottom: 16, fontFamily: 'var(--font-mono)' }}>
                    Current State
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {timelineSteps.map((step, i) => (
                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{
                          width: 24, height: 24, borderRadius: 4,
                          background: `${step.color}18`, border: `1px solid ${step.color}40`,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: 12, color: step.color, flexShrink: 0,
                        }}>
                          {step.icon}
                        </div>
                        <div style={{
                          flex: 1, height: 28, borderRadius: 4,
                          background: `${step.color}10`, border: `1px solid ${step.color}15`,
                          display: 'flex', alignItems: 'center', paddingLeft: 10,
                          fontSize: 12, color: 'var(--text-secondary)',
                        }}>
                          {step.label}
                        </div>
                        {i < timelineSteps.length - 1 && (
                          <div style={{ color: 'var(--text-muted)', fontSize: 10, width: 20, textAlign: 'center' }}>{'\u2193'}</div>
                        )}
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop: 12, fontSize: 12, color: 'var(--red)', fontFamily: 'var(--font-mono)', textAlign: 'center' }}>
                    ~ 12-26 weeks
                  </div>
                </Card>
              </div>

              <div className={`fade-in fade-in-delay-4 ${visible ? 'visible' : ''}`}>
                <Card style={{ padding: 20, borderColor: 'var(--border-accent)' }}>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: 'var(--accent)', marginBottom: 16, fontFamily: 'var(--font-mono)' }}>
                    With Pre-Flight
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {preflightSteps.map((step, i) => (
                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{
                          width: 24, height: 24, borderRadius: 4,
                          background: `${step.color}18`, border: `1px solid ${step.color}40`,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: 12, color: step.color, flexShrink: 0,
                        }}>
                          {step.icon}
                        </div>
                        <div style={{
                          flex: 1, height: 28, borderRadius: 4,
                          background: `${step.color}10`, border: `1px solid ${step.color}15`,
                          display: 'flex', alignItems: 'center', paddingLeft: 10,
                          fontSize: 12, color: 'var(--text-secondary)',
                        }}>
                          {step.label}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop: 12, fontSize: 12, color: 'var(--accent)', fontFamily: 'var(--font-mono)', textAlign: 'center' }}>
                    ~ 4-8 weeks
                  </div>
                </Card>
              </div>
            </div>

            <div className={`fade-in fade-in-delay-5 ${visible ? 'visible' : ''}`} style={{ marginTop: 24 }}>
              <Callout>
                The real cost is not just time. Every delayed verification cycle erodes customer confidence, slows credit issuance revenue, and gives competitors a window to close deals.
              </Callout>
            </div>
          </div>
          <SlideNumber number={2} total={16} />
        </section>
      );
    }

    // ========================================================================
    // SLIDE 3: THE EVIDENCE
    // ========================================================================

    function EvidenceSlide() {
