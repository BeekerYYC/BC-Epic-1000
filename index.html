    [data-theme="sunset"] {

      --bg-secondary: #112718;

      --text-secondary: #86efac;
      --text-muted: #4ade80;
      --accent: #34d399;
      --accent-glow: rgba(52, 211, 153, 0.15);
      --accent-secondary: #a3e635;
      --gradient-start: #10b981;
      --gradient-end: #34d399;
      --border: rgba(134, 239, 172, 0.1);
      --danger: #fb923c;
      --success: #a3e635;
      --hero-gradient: linear-gradient(135deg, #0a1a0f 0%, #112718 40%, #0a1a10 100%);
      --card-shadow: 0 4px 24px rgba(0,0,0,0.35);

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;

      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible {

    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes mountain-drift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
  </style>
</head>

    // ─── Hooks ────────────────────────────────────────────
    function useIntersection(options = {}) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setVisible(true);
            observer.unobserve(entry.target);
          }
        }, { threshold: 0.15, ...options });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return [ref, visible];
    }

    function ElevationProfile() {
      const [ref, visible] = useIntersection();
      // Simplified elevation profile data (approximate)
      const points = [
        { km: 0, elev: 390, label: 'Penticton' },
        { km: 60, elev: 1250, label: '' },
        { km: 100, elev: 1100, label: '' },
        { km: 150, elev: 780, label: 'Beaverdell' },
        { km: 190, elev: 520, label: 'Kettle River' },
        { km: 230, elev: 600, label: 'Rock Creek' },
        { km: 270, elev: 700, label: 'Midway' },
        { km: 320, elev: 530, label: 'Grand Forks' },
        { km: 390, elev: 480, label: 'Castlegar' },
        { km: 440, elev: 680, label: '' },
        { km: 490, elev: 560, label: '' },
        { km: 530, elev: 540, label: 'Nelson' },
        { km: 580, elev: 900, label: '' },
        { km: 610, elev: 1650, label: 'White Grouse' },
        { km: 650, elev: 1120, label: 'Kimberley' },
        { km: 720, elev: 1300, label: '' },
        { km: 770, elev: 1100, label: '' },
        { km: 820, elev: 1010, label: 'Fernie' },
      ];

      const maxElev = 1800;
      const minElev = 300;
      const width = 1060;
      const height = 200;

      const pathPoints = points.map(p => {
        const x = (p.km / 820) * width;
        const y = height - ((p.elev - minElev) / (maxElev - minElev)) * height;
        return { x, y, ...p };
      });

      const pathD = pathPoints.reduce((d, p, i) => {
        if (i === 0) return `M ${p.x} ${p.y}`;
        const prev = pathPoints[i - 1];
        const cpx1 = prev.x + (p.x - prev.x) * 0.5;
        const cpx2 = prev.x + (p.x - prev.x) * 0.5;
        return `${d} C ${cpx1} ${prev.y}, ${cpx2} ${p.y}, ${p.x} ${p.y}`;
      }, '');

      const areaD = `${pathD} L ${width} ${height} L 0 ${height} Z`;

      return (
        <div ref={ref} className={`fade-in ${visible ? 'visible' : ''}`} style={{
          background: 'var(--bg-card)', borderRadius: 16,
          padding: '28px 28px 16px', border: '1px solid var(--border)',
        }}>
          <h3 style={{ fontSize: 18, fontWeight: 600, marginBottom: 20, color: 'var(--text-secondary)' }}>
            Elevation Profile
          </h3>
          <div style={{ overflowX: 'auto' }}>
            <svg viewBox={`-20 -30 ${width + 40} ${height + 60}`} style={{ width: '100%', minWidth: 600, height: 'auto' }}>
              <defs>
                <linearGradient id="elevGrad" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stopColor="var(--accent)" />
                  <stop offset="50%" stopColor="var(--accent-secondary)" />
                  <stop offset="100%" stopColor="var(--accent)" />
                </linearGradient>
                <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3" />
                  <stop offset="100%" stopColor="var(--accent)" stopOpacity="0.02" />
                </linearGradient>
              </defs>

              {/* Grid lines */}
              {[500, 1000, 1500].map(elev => {
                const y = height - ((elev - minElev) / (maxElev - minElev)) * height;
                return (
                  <g key={elev}>
                    <line x1={0} y1={y} x2={width} y2={y} stroke="var(--border)" strokeDasharray="4,4" />
                    <text x={-8} y={y + 4} fill="var(--text-muted)" fontSize="10" textAnchor="end">{elev}m</text>
                  </g>
                );
              })}

              {/* Area fill */}
              <path d={areaD} fill="url(#areaGrad)" />

              {/* Line */}
              <path d={pathD} fill="none" stroke="url(#elevGrad)" strokeWidth="3" strokeLinecap="round" />

              {/* Day markers */}
              {[0, 190, 390, 530, 650, 820].map((km, i) => {
                const x = (km / 820) * width;
                return (
                  <line key={km} x1={x} y1={0} x2={x} y2={height}
                    stroke="var(--accent)" strokeOpacity="0.2" strokeDasharray="2,4" />
                );
              })}

              {/* Labeled points */}
              {pathPoints.filter(p => p.label).map(p => (
                <g key={p.label}>
                  <circle cx={p.x} cy={p.y} r="4" fill="var(--accent)" />
                  <circle cx={p.x} cy={p.y} r="7" fill="none" stroke="var(--accent)" strokeOpacity="0.3" />
                  <text x={p.x} y={p.y - 14} fill="var(--text-secondary)" fontSize="10" textAnchor="middle" fontWeight="500">
                    {p.label}
                  </text>
                </g>
              ))}

              {/* KM axis */}
              {[0, 200, 400, 600, 800].map(km => {
                const x = (km / 820) * width;
                return (
                  <text key={km} x={x} y={height + 20} fill="var(--text-muted)" fontSize="10" textAnchor="middle">
                    {km} km
                  </text>
                );
              })}
            </svg>
          </div>
        </div>
      );
    }

    function DifficultyBar({ level }) {
      return (
        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
          {[1,2,3,4,5].map(i => (
            <div key={i} style={{
              width: 20, height: 6, borderRadius: 3,
              background: i <= level
                ? (level >= 5 ? 'var(--danger)' : level >= 3 ? 'var(--accent)' : 'var(--success)')
                : 'var(--border)',
              transition: 'all 0.3s ease',
            }} />
          ))}
          <span style={{ fontSize: 12, color: 'var(--text-muted)', marginLeft: 6 }}>
            {level <= 2 ? 'Easy' : level <= 3 ? 'Moderate' : level <= 4 ? 'Hard' : 'Beast'}
          </span>
        </div>
      );
    }

    function DayCard({ day, index }) {
      const [ref, visible] = useIntersection();
      const [expanded, setExpanded] = useState(false);

      return (
        <div ref={ref} className={`fade-in ${visible ? 'visible' : ''}`} style={{
          background: 'var(--bg-card)',
          borderRadius: 16, overflow: 'hidden',
          border: '1px solid var(--border)',
          transition: 'all 0.4s ease',
          transitionDelay: `${index * 80}ms`,
          cursor: 'pointer',
        }}
        onClick={() => setExpanded(!expanded)}
        onMouseOver={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.boxShadow = '0 8px 32px rgba(0,0,0,0.3)'; }}
        onMouseOut={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.boxShadow = 'none'; }}
        >
          {/* Header */}
          <div style={{ padding: '24px 28px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
                <span style={{
                  fontSize: 28,
                  animation: expanded ? 'float 3s ease-in-out infinite' : 'none',
                }}>{day.emoji}</span>
                <div>
                  <div style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1.5 }}>
                    Day {day.day}
                  </div>
                  <h3 style={{ fontSize: 20, fontWeight: 700 }}>{day.title}</h3>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', marginTop: 12 }}>
                <span style={{ fontSize: 14, color: 'var(--text-secondary)' }}>📏 {day.distance}</span>
                <span style={{ fontSize: 14, color: 'var(--text-secondary)' }}>⛰️ {day.elevation}</span>
                <span style={{ fontSize: 14, color: 'var(--text-secondary)' }}>🛤️ {day.terrain}</span>
              </div>
              <div style={{ marginTop: 10 }}>
                <DifficultyBar level={day.difficulty} />
              </div>
            </div>
            <div style={{
              fontSize: 20, color: 'var(--text-muted)',
              transform: expanded ? 'rotate(180deg)' : 'rotate(0)',
              transition: 'transform 0.3s ease',
            }}>▼</div>
          </div>

          {/* Expandable content */}
          <div style={{
            maxHeight: expanded ? 400 : 0,
            overflow: 'hidden',
            transition: 'max-height 0.4s ease',
          }}>
            <div style={{ padding: '0 28px 24px', borderTop: '1px solid var(--border)', paddingTop: 20 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
                <div>
                  <h4 style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>
                    Highlights
                  </h4>
                  {day.highlights.map((h, i) => (
                    <div key={i} style={{ fontSize: 14, color: 'var(--text-secondary)', marginBottom: 6, paddingLeft: 14, position: 'relative' }}>
                      <span style={{ position: 'absolute', left: 0, color: 'var(--accent)' }}>•</span>
                      {h}
                    </div>
                  ))}
                </div>
                <div>
                  <h4 style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>
                    Details
                  </h4>
                  <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginBottom: 10 }}>
                    <strong style={{ color: 'var(--text-primary)' }}>Resupply:</strong> {day.resupply}
                  </div>
                  <div style={{
                    fontSize: 13, color: 'var(--danger)',
                    background: 'rgba(249,115,22,0.1)',
                    padding: '10px 14px', borderRadius: 8,
                    border: '1px solid rgba(249,115,22,0.2)',
                  }}>
                    💡 {day.tip}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function RouteSection() {
      const [ref, visible] = useIntersection();
      return (
        <section id="route" style={{ padding: '100px 20px', maxWidth: 900, margin: '0 auto' }}>
          <div ref={ref} className={`fade-in ${visible ? 'visible' : ''}`} style={{ textAlign: 'center', marginBottom: 48 }}>
            <h2 style={{
              fontFamily: "'Playfair Display', serif",
              fontSize: 'clamp(32px, 5vw, 48px)',
              fontWeight: 800, marginBottom: 12,
            }}>
              Day by Day
            </h2>
            <p style={{ color: 'var(--text-secondary)', maxWidth: 600, margin: '0 auto', fontSize: 16 }}>
              Click each day to expand details. 5 days of epic riding through BC's interior ranges.
            </p>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {DAYS.map((day, i) => (
              <DayCard key={day.day} day={day} index={i} />
            ))}
          </div>
        </section>
      );
    }

    function TerrainSection() {
      const [ref, visible] = useIntersection();
      const terrain = [
        { type: 'Rail Grade (KVR, Columbia Western, Great Northern)', pct: 55, color: 'var(--accent)' },
        { type: 'Gravel Forest Service Road', pct: 20, color: 'var(--accent-secondary)' },
        { type: 'Paved Road', pct: 12, color: 'var(--success)' },
        { type: 'Singletrack', pct: 8, color: 'var(--danger)' },
        { type: 'Mixed / Other', pct: 5, color: 'var(--text-muted)' },
      ];

      return (
        <section id="terrain" style={{ padding: '100px 20px', maxWidth: 1000, margin: '0 auto' }}>
          <div ref={ref} className={`fade-in ${visible ? 'visible' : ''}`}>
            <h2 style={{
              fontFamily: "'Playfair Display', serif",
              fontSize: 'clamp(32px, 5vw, 48px)',
              fontWeight: 800, marginBottom: 12, textAlign: 'center',
            }}>
              What to Expect
            </h2>
            <p style={{ textAlign: 'center', color: 'var(--text-secondary)', maxWidth: 700, margin: '0 auto 48px', fontSize: 16, lineHeight: 1.7 }}>
              Historic rail beds, rugged gravel roads, and some gnarly singletrack.
              Don't let the "rail grade" label fool you — the terrain is rough with loose gravel,
              washouts, and washboard. Only 7 of 15 riders finished the inaugural event.
            </p>
          </div>

          <div style={{
            display: 'grid', gridTemplateColumns: '1fr 1fr',
            gap: 24, marginBottom: 48,
          }}>
            {/* Terrain breakdown */}
            <div style={{
              background: 'var(--bg-card)', borderRadius: 16, padding: 28,
              border: '1px solid var(--border)',
            }}>
              <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 20, color: 'var(--text-secondary)' }}>
                Surface Breakdown (approx.)
              </h3>
              {terrain.map((t, i) => {
                const [barRef, barVis] = useIntersection();
                return (
                  <div key={i} ref={barRef} style={{ marginBottom: 16 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                      <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{t.type}</span>
                      <span style={{ fontSize: 13, fontWeight: 600, color: t.color }}>{t.pct}%</span>
                    </div>
                    <div style={{ height: 8, background: 'var(--bg-secondary)', borderRadius: 4, overflow: 'hidden' }}>
                      <div style={{
                        width: barVis ? `${t.pct}%` : '0%',
                        height: '100%', borderRadius: 4,
                        background: t.color,
                        transition: `width 1s ease ${i * 0.15}s`,
                      }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Key features */}
            <div style={{
              background: 'var(--bg-card)', borderRadius: 16, padding: 28,
              border: '1px solid var(--border)',
            }}>
              <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 20, color: 'var(--text-secondary)' }}>
                Notable Features
              </h3>
              {[
                { icon: '🌉', title: 'Historic Trestles', desc: 'Hundreds of feet high, spanning dramatic valleys' },
                { icon: '🚇', title: 'Railway Tunnels', desc: 'Longest is almost 1 km — bring a headlamp!' },
                { icon: '⛴️', title: 'Ferry Crossing', desc: 'Kootenay Lake ferry on Day 4' },
                { icon: '🏔️', title: 'Mountain Passes', desc: 'White Grouse Pass, Farron Pass area' },
                { icon: '🐻', title: 'Wildlife Country', desc: 'Grizzly, black bear, moose, elk territory' },
                { icon: '📵', title: 'Off-Grid Sections', desc: 'No cell service for up to 8 hours between towns' },
              ].map((f, i) => (
                <div key={i} style={{
                  display: 'flex', gap: 14, alignItems: 'flex-start',
                  marginBottom: 16, padding: '10px 12px', borderRadius: 10,
                  transition: 'background 0.2s',
                }}
                onMouseOver={e => e.currentTarget.style.background = 'var(--bg-card-hover)'}
                onMouseOut={e => e.currentTarget.style.background = 'transparent'}
                >
                  <span style={{ fontSize: 22, flexShrink: 0 }}>{f.icon}</span>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{f.title}</div>
                    <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>{f.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function GearSection() {
      const [ref, visible] = useIntersection();
      return (
        <section id="gear" style={{ padding: '100px 20px', maxWidth: 900, margin: '0 auto' }}>
          <div ref={ref} className={`fade-in ${visible ? 'visible' : ''}`}>
            <h2 style={{
              fontFamily: "'Playfair Display', serif",
              fontSize: 'clamp(32px, 5vw, 48px)',
              fontWeight: 800, marginBottom: 12, textAlign: 'center',
            }}>
              Gear Essentials
            </h2>
            <p style={{ textAlign: 'center', color: 'var(--text-secondary)', maxWidth: 600, margin: '0 auto 48px', fontSize: 16 }}>
              Gravel bike with 2"+ tires or hardtail MTB. Bikepacking bags recommended.
              Cyclocross bikes with skinny tires won't cut it on this terrain.
            </p>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 16 }}>
            {GEAR_ESSENTIALS.map((g, i) => {
              const [cardRef, cardVis] = useIntersection();
              return (
                <div key={i} ref={cardRef} className={`fade-in ${cardVis ? 'visible' : ''}`} style={{
                  background: 'var(--bg-card)', borderRadius: 14, padding: 22,
                  border: '1px solid var(--border)',
                  transition: 'all 0.3s ease',
                  transitionDelay: `${i * 60}ms`,
                }}
                onMouseOver={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.transform = 'translateY(-3px)'; }}
                onMouseOut={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.transform = 'translateY(0)'; }}
                >
                  <span style={{ fontSize: 28 }}>{g.icon}</span>
                  <h4 style={{ fontSize: 15, fontWeight: 700, marginTop: 10, marginBottom: 6 }}>{g.item}</h4>
                  <p style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.5 }}>{g.note}</p>
                </div>
              );
            })}
          </div>
        </section>
      );
    }

    function DiscussSection() {
      const [ref, visible] = useIntersection();
      return (
        <section id="discuss" style={{
          padding: '100px 20px 120px',
          background: 'var(--bg-secondary)',
        }}>
          <div style={{ maxWidth: 900, margin: '0 auto' }}>
            <div ref={ref} className={`fade-in ${visible ? 'visible' : ''}`} style={{ textAlign: 'center', marginBottom: 48 }}>
              <h2 style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: 'clamp(32px, 5vw, 48px)',
                fontWeight: 800, marginBottom: 12,
              }}>
                Let's Talk
              </h2>
              <p style={{ color: 'var(--text-secondary)', maxWidth: 600, margin: '0 auto', fontSize: 16, lineHeight: 1.7 }}>
                Lots to figure out together. Here's what's on the table for discussion.
                Nothing is set in stone — this is our ride, our pace.
              </p>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
              {DISCUSSION_TOPICS.map((d, i) => {
                const [cardRef, cardVis] = useIntersection();
                return (
                  <div key={i} ref={cardRef} className={`fade-in ${cardVis ? 'visible' : ''}`} style={{
                    background: 'var(--bg-card)', borderRadius: 14, padding: 24,
                    border: '1px solid var(--border)',
                    transition: 'all 0.3s ease',
                    transitionDelay: `${i * 80}ms`,
                  }}
                  onMouseOver={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.background = 'var(--bg-card-hover)'; }}
                  onMouseOut={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'var(--bg-card)'; }}
                  >
                    <span style={{ fontSize: 28 }}>{d.icon}</span>
                    <h4 style={{ fontSize: 16, fontWeight: 700, marginTop: 10, marginBottom: 8 }}>{d.topic}</h4>
                    <p style={{ fontSize: 14, color: 'var(--text-muted)', lineHeight: 1.6 }}>{d.detail}</p>
                  </div>
                );
              })}
            </div>

            <div style={{
              marginTop: 56, textAlign: 'center',
              background: 'var(--bg-card)', borderRadius: 16, padding: 36,
              border: '1px solid var(--border)',
            }}>
              <h3 style={{ fontSize: 22, fontWeight: 700, marginBottom: 12 }}>Key Dates</h3>
              <div style={{ display: 'flex', justifyContent: 'center', gap: 40, flexWrap: 'wrap' }}>
                <div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: 'var(--accent)' }}>June 8–21</div>
                  <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>Target window (weeks 2-3)</div>
                </div>
                <div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: 'var(--accent-secondary)' }}>5 Days</div>
                  <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>Riding (+ potential rest day)</div>
                </div>
              </div>
              <p style={{ marginTop: 20, fontSize: 14, color: 'var(--text-muted)', fontStyle: 'italic' }}>
                Note: Snow at higher passes (Grey Creek, Farron) usually clears by late June.
                Earlier dates mean higher snow risk.
              </p>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer style={{
          padding: '32px 20px',
          textAlign: 'center',
          borderTop: '1px solid var(--border)',
          background: 'var(--bg-primary)',
        }}>
          <p style={{ fontSize: 14, color: 'var(--text-muted)', marginBottom: 8 }}>
            BC Epic 1000 — Penticton to Fernie — June 2026
          </p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 20, fontSize: 13 }}>
            <a href="https://www.strava.com/routes/3463368757543966168" target="_blank" rel="noopener noreferrer"
              style={{ color: 'var(--accent)', textDecoration: 'none' }}>
              View on Strava ↗
            </a>
            <a href="https://www.bcepic1000.com/route-map" target="_blank" rel="noopener noreferrer"
              style={{ color: 'var(--accent)', textDecoration: 'none' }}>
              Official Route Map ↗
            </a>
          </div>
          <p style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 16, opacity: 0.5 }}>
            Self-paced, self-supported. Not affiliated with the official BC Epic 1000 event.
          </p>
        </footer>
      );
    }

    // ─── App ──────────────────────────────────────────────
    function App() {
      const [theme, setTheme] = useState('alpine');
      const [activeSection, setActiveSection] = useState('hero');

      useEffect(() => {
        document.body.setAttribute('data-theme', theme);
      }, [theme]);

      useEffect(() => {
        const sections = ['hero', 'overview', 'route', 'terrain', 'gear', 'discuss'];
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setActiveSection(entry.target.id);
            }
          });
        }, { threshold: 0.3 });

        sections.forEach(id => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });

        return () => observer.disconnect();
      }, []);

      return (
        <>
          <ThemeSwitcher theme={theme} setTheme={setTheme} />
          <Nav activeSection={activeSection} />
          <Hero />
          <Overview />
          <RouteSection />
          <TerrainSection />
          <GearSection />
          <DiscussSection />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
