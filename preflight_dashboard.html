  const styles = {
    pass: { bg: '#d1fae5', color: '#065f46', border: '#a7f3d0' },
    fail: { bg: '#fee2e2', color: '#991b1b', border: '#fecaca' },
    warn: { bg: '#fef3c7', color: '#92400e', border: '#fde68a' },
    hardstop: { bg: '#ef4444', color: '#ffffff', border: '#dc2626' },
    draft: { bg: '#fef3c7', color: '#92400e', border: '#fde68a' },
    info: { bg: '#dbeafe', color: '#1e40af', border: '#bfdbfe' },
    critical: { bg: '#fee2e2', color: '#991b1b', border: '#fecaca' },
    ready: { bg: '#d1fae5', color: '#065f46', border: '#a7f3d0' },
    low: { bg: '#d1fae5', color: '#065f46', border: '#a7f3d0' },
    neutral: { bg: '#f1f5f9', color: '#475569', border: '#e2e8f0' },
  };
  const s = styles[type] || styles.neutral;
  const fontSize = size === 'lg' ? '0.8rem' : size === 'sm' ? '0.65rem' : '0.7rem';
  const padding = size === 'lg' ? '4px 12px' : size === 'sm' ? '2px 6px' : '2px 8px';
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      fontSize, fontWeight: 600, letterSpacing: '0.03em',
      padding, borderRadius: 4,
      background: s.bg, color: s.color, border: `1px solid ${s.border}`,
      lineHeight: 1.4, whiteSpace: 'nowrap', textTransform: 'uppercase',
    }}>
      {children}
    </span>
  );
}

/* ─── Circular Progress ─── */
function CircularProgress({ value, max, size = 64, strokeWidth = 5, color = 'var(--accent)' }) {
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const progress = (value / max) * circumference;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="var(--border)" strokeWidth={strokeWidth} />
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth}
        strokeDasharray={circumference} strokeDashoffset={circumference - progress}
        strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s ease' }} />
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        style={{ transform: 'rotate(90deg)', transformOrigin: 'center', fontSize: size * 0.26, fontWeight: 700, fontFamily: 'Inter', fill: 'var(--text)' }}>
        {value}/{max}
      </text>
    </svg>
  );
}

/* ─── State 2: Loading ─── */
function PreFlightLoading({ onComplete }) {
  const steps = [
    'Checking biochar characterization...',
    'Checking mass measurements...',
    'Checking LCA completeness...',
    'Checking calculations...',
    'Checking records...',
    'Checking stock reconciliation...',
    'Complete',
  ];
  const stepResults = ['fail', 'fail', 'fail', 'fail', 'fail', 'fail', 'done'];
  const [currentStep, setCurrentStep] = useState(0);
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    const totalTime = 2800;
    const stepTime = totalTime / steps.length;
    const progressInterval = setInterval(() => {
      setProgress(p => Math.min(p + 1.5, 100));
    }, totalTime / 67);
    const stepInterval = setInterval(() => {
      setCurrentStep(s => {
        if (s >= steps.length - 1) {
          clearInterval(stepInterval);
          clearInterval(progressInterval);
          setProgress(100);
          setTimeout(onComplete, 500);
          return s;
        }
        return s + 1;
      });
    }, stepTime);
    return () => { clearInterval(stepInterval); clearInterval(progressInterval); };
  }, []);

  return (
    <div style={{
      animation: 'fadeIn 0.3s ease', maxWidth: 560, margin: '0 auto',
      padding: '80px 24px', textAlign: 'center',
    }}>
      <div style={{
        background: 'var(--card)', borderRadius: 'var(--radius-xl)',
        border: '1px solid var(--border)', padding: '48px 40px',
        boxShadow: 'var(--shadow-md)',
      }}>
        <div style={{
          width: 56, height: 56, borderRadius: '50%', margin: '0 auto 24px',
          background: 'linear-gradient(135deg, #d1fae5, #a7f3d0)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {currentStep < steps.length - 1 ? (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ animation: 'spin 1s linear infinite' }}>
              <circle cx="12" cy="12" r="10" stroke="#d1fae5" strokeWidth="3" />
              <path d="M12 2a10 10 0 019.8 8" stroke="#10b981" strokeWidth="3" strokeLinecap="round" />
            </svg>
          ) : (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ animation: 'scaleIn 0.3s ease' }}>
              <path d="M6 12L10.5 16.5L18 7.5" stroke="#059669" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          )}
        </div>
        <h2 style={{ fontSize: '1.15rem', fontWeight: 600, marginBottom: 24 }}>Running Pre-Flight Checks</h2>

        {/* Progress bar */}
        <div style={{
          height: 6, borderRadius: 3, background: 'var(--border-light)',
          overflow: 'hidden', marginBottom: 28,
        }}>
          <div style={{
            height: '100%', borderRadius: 3,
            background: 'linear-gradient(90deg, #10b981, #059669)',
            width: `${progress}%`,
            transition: 'width 0.15s linear',
          }} />
        </div>

        {/* Steps */}
        <div style={{ textAlign: 'left' }}>
          {steps.map((step, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '6px 0', fontSize: '0.87rem',
              opacity: i <= currentStep ? 1 : 0.3,
              transition: 'opacity 0.3s ease',
            }}>
              <div style={{ width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {i < currentStep ? (
                  stepResults[i] === 'fail' ? (
                    <div style={{ width: 18, height: 18, borderRadius: '50%', background: '#fee2e2', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {Icons.x({ size: 11, color: '#ef4444' })}
                    </div>
                  ) : (
                    <div style={{ width: 18, height: 18, borderRadius: '50%', background: '#d1fae5', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {Icons.check({ size: 11, color: '#059669' })}
                    </div>
                  )
                ) : i === currentStep && i < steps.length - 1 ? (
                  <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ animation: 'spin 1s linear infinite' }}>
                    <circle cx="9" cy="9" r="7" stroke="#e2e8f0" strokeWidth="2" />
                    <path d="M9 2a7 7 0 016.9 5.8" stroke="#10b981" strokeWidth="2" strokeLinecap="round" />
                  </svg>
                ) : i === currentStep && i === steps.length - 1 ? (
                  <div style={{ width: 18, height: 18, borderRadius: '50%', background: '#d1fae5', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    {Icons.check({ size: 11, color: '#059669' })}
                  </div>
                ) : (
                  <div style={{ width: 18, height: 18, borderRadius: '50%', background: '#f1f5f9' }} />
                )}
              </div>
              <span style={{
                fontWeight: i === currentStep ? 500 : 400,
                color: i <= currentStep ? 'var(--text)' : 'var(--text-muted)',
              }}>{step}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── Check Item Component ─── */
function CheckItem({ item, expanded, onToggle }) {
  const hasDetail = item.rule || item.remediation || item.methodRef;
  const isExpandable = hasDetail && item.status !== 'pass';

  const statusIcon = item.status === 'pass'
    ? <div style={{ width: 20, height: 20, borderRadius: '50%', background: '#d1fae5', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{Icons.check({ size: 12, color: '#059669' })}</div>
    : item.status === 'warn'
    ? <div style={{ width: 20, height: 20, borderRadius: '50%', background: '#fef3c7', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{Icons.warning({ size: 12, color: '#d97706' })}</div>
    : <div style={{ width: 20, height: 20, borderRadius: '50%', background: '#fee2e2', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{Icons.x({ size: 12, color: '#ef4444' })}</div>;

  return (
    <div style={{
      borderBottom: '1px solid var(--border-light)',
      transition: 'background 0.15s ease',
    }}>
      <div
        onClick={isExpandable ? onToggle : undefined}
        style={{
          display: 'flex', alignItems: 'flex-start', gap: 10, padding: '12px 20px',
          cursor: isExpandable ? 'pointer' : 'default',
          background: expanded ? '#fafbfc' : 'transparent',
        }}
        onMouseEnter={e => { if (isExpandable) e.currentTarget.style.background = '#fafbfc'; }}
        onMouseLeave={e => { if (!expanded) e.currentTarget.style.background = 'transparent'; }}
      >
        {statusIcon}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            {item.status !== 'pass' && (
              <Badge type={item.status === 'fail' ? 'fail' : 'warn'} size="sm">
                {item.status === 'fail' ? 'FAIL' : 'WARN'}
              </Badge>
            )}
            {item.hardStop && <Badge type="hardstop" size="sm">HARD STOP</Badge>}
            <span className="mono" style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>{item.id}</span>
            <span style={{ fontSize: '0.87rem', fontWeight: 600, color: 'var(--text)' }}>{item.title}</span>
          </div>
          <div style={{ fontSize: '0.82rem', color: 'var(--text-secondary)', marginTop: 4 }}>
            {item.finding}
          </div>
        </div>
        {isExpandable && (
          <div style={{
            marginTop: 2, flexShrink: 0,
            transform: expanded ? 'rotate(0deg)' : 'rotate(-90deg)',
            transition: 'transform 0.2s ease', color: 'var(--text-muted)',
          }}>
            {Icons.chevronDown({ size: 14 })}
          </div>
        )}
      </div>
      {expanded && hasDetail && (
        <div style={{
          padding: '0 20px 16px 50px', animation: 'fadeInFast 0.2s ease',
        }}>
          <div style={{
            background: item.status === 'fail' ? '#fef2f2' : '#fffbeb',
            borderRadius: 'var(--radius)', padding: '14px 16px',
            borderLeft: `3px solid ${item.status === 'fail' ? '#ef4444' : '#f59e0b'}`,
            fontSize: '0.82rem',
          }}>
            {item.rule && (
              <div style={{ marginBottom: 8 }}>
                <span style={{ fontWeight: 600, color: 'var(--text)' }}>Rule: </span>
                <span style={{ color: 'var(--text-secondary)' }}>{item.rule}</span>
              </div>
            )}
            {item.methodRef && (
              <div style={{ marginBottom: 8 }}>
                <span style={{ fontWeight: 600, color: 'var(--text)' }}>Methodology Ref: </span>
                <span className="mono" style={{ fontSize: '0.78rem', color: 'var(--info)' }}>{item.methodRef}</span>
              </div>
            )}
            {item.remediation && (
              <div>
                <span style={{ fontWeight: 600, color: 'var(--text)' }}>Remediation: </span>
                <span style={{ color: 'var(--text-secondary)' }}>{item.remediation}</span>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Category Section ─── */
function CategorySection({ catKey, category, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  const [expandedItems, setExpandedItems] = useState({});

  const fails = category.items.filter(i => i.status === 'fail').length;
  const warns = category.items.filter(i => i.status === 'warn').length;
  const passes = category.items.filter(i => i.status === 'pass').length;

  const iconMap = {
    flask: Icons.flask,
    scale: Icons.scale,
    leaf: Icons.leaf,
    calculator: Icons.calculator,
    folder: Icons.folder,
    box: Icons.box,
  };
  const IconComp = iconMap[category.icon];
  const catColor = fails > 0 ? '#ef4444' : warns > 0 ? '#f59e0b' : '#10b981';

  return (
    <div style={{
      background: 'var(--card)', borderRadius: 'var(--radius-lg)',
      border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)',
      overflow: 'hidden', marginBottom: 12,
    }}>
      <div
        onClick={() => setOpen(!open)}
        style={{
          display: 'flex', alignItems: 'center', gap: 12, padding: '14px 20px',
          cursor: 'pointer', userSelect: 'none',
          transition: 'background 0.15s ease',
        }}
        onMouseEnter={e => e.currentTarget.style.background = '#fafbfc'}
        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
      >
        <div style={{
          width: 32, height: 32, borderRadius: 8,
          background: fails > 0 ? '#fee2e2' : warns > 0 ? '#fef3c7' : '#d1fae5',
          display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
        }}>
          <IconComp size={16} color={catColor} />
        </div>
        <div style={{ flex: 1 }}>
          <span style={{ fontWeight: 600, fontSize: '0.92rem' }}>{category.label}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          {fails > 0 && <Badge type="fail" size="sm">{fails} Failed</Badge>}
          {warns > 0 && <Badge type="warn" size="sm">{warns} Warning{warns > 1 ? 's' : ''}</Badge>}
          {passes > 0 && <Badge type="pass" size="sm">{passes} Passed</Badge>}
        </div>
        <div style={{
          transform: open ? 'rotate(0deg)' : 'rotate(-90deg)',
          transition: 'transform 0.2s ease', color: 'var(--text-muted)', flexShrink: 0,
        }}>
          {Icons.chevronDown({ size: 16 })}
        </div>
      </div>
      {open && (
        <div style={{ borderTop: '1px solid var(--border-light)' }}>
          {category.items.map((item, i) => (
            <CheckItem
              key={item.id}
              item={item}
              expanded={!!expandedItems[item.id]}
              onToggle={() => setExpandedItems(prev => ({ ...prev, [item.id]: !prev[item.id] }))}
            />
          ))}
        </div>
      )}
    </div>
  );
}

              onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #10b981, #059669)'; e.currentTarget.style.transform = 'none'; }}
            >
              {Icons.send({ size: 14 })} Submit to Registry
            </button>
          ) : (
            <button onClick={onRerun} style={{
              padding: '9px 20px', borderRadius: 'var(--radius)', border: 'none',
              background: 'linear-gradient(135deg, #10b981, #059669)',
              color: 'white', fontSize: '0.85rem', fontWeight: 600,
              cursor: 'pointer', fontFamily: 'Inter', display: 'flex', alignItems: 'center', gap: 6,
              boxShadow: '0 1px 3px rgba(16,185,129,0.3)', transition: 'all 0.15s ease',
            }}
              onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #059669, #047857)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #10b981, #059669)'; e.currentTarget.style.transform = 'none'; }}
            >
              {Icons.refresh({ size: 14 })} Fix Issues & Re-run
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function IssueResults() {
  const catKeys = Object.keys(CHECKS);
  return (
    <div>
      {catKeys.map((key, i) => (
        <CategorySection
          key={key}
          catKey={key}
          category={CHECKS[key]}
          defaultOpen={i === 0}
        />
      ))}
    </div>
  );
}

/* ─── State 4: All Clear ─── */
function CleanResults() {
  const catKeys = Object.keys(CHECKS);
  return (
    <div>
      {/* Confidence banner */}
      <div style={{
        background: 'linear-gradient(135deg, #ecfdf5, #d1fae5)',
        borderRadius: 'var(--radius-lg)',
        border: '1px solid #a7f3d0',
        padding: '20px 24px', marginBottom: 16,
        display: 'flex', alignItems: 'center', gap: 16,
      }}>
        <div style={{
          width: 44, height: 44, borderRadius: '50%',
          background: '#10b981', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
        }}>
          {Icons.shield({ size: 22, color: 'white', inner: <path d="M7 10.5l2.5 2.5 4.5-5" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/> })}
        </div>
        <div>
          <div style={{ fontWeight: 700, fontSize: '1rem', color: '#065f46', marginBottom: 2 }}>All Pre-Flight Checks Passed</div>
          <div style={{ fontSize: '0.85rem', color: '#047857' }}>
            Your data appears compliant with Puro.earth Biochar Methodology Ed. 2022 v3.
            This report is ready for registry submission.
          </div>
        </div>
      </div>

      {/* All green categories */}
      {catKeys.map(key => {
        const cat = CHECKS[key];
        const iconMap = { flask: Icons.flask, scale: Icons.scale, leaf: Icons.leaf, calculator: Icons.calculator, folder: Icons.folder, box: Icons.box };
        const IconComp = iconMap[cat.icon];
        return (
          <div key={key} style={{
            background: 'var(--card)', borderRadius: 'var(--radius-lg)',
            border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)',
            padding: '14px 20px', marginBottom: 8,
            display: 'flex', alignItems: 'center', gap: 12,
          }}>
            <div style={{
              width: 32, height: 32, borderRadius: 8,
              background: '#d1fae5',
              display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
            }}>
              <IconComp size={16} color="#10b981" />
            </div>
            <span style={{ fontWeight: 600, fontSize: '0.9rem', flex: 1 }}>{cat.label}</span>
            <Badge type="pass" size="sm">{cat.items.length} Passed</Badge>
            <div style={{ width: 20, height: 20, borderRadius: '50%', background: '#d1fae5', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {Icons.check({ size: 12, color: '#059669' })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [state, setState] = useState('submission'); // submission | loading | results
  const [showClean, setShowClean] = useState(false);

  const handleRunCheck = useCallback(() => setState('loading'), []);
  const handleLoadingComplete = useCallback(() => setState('results'), []);
  const handleRerun = useCallback(() => {
    setState('loading');
    // After loading, could switch to clean or issues again
  }, []);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <NavBar />

      {/* Sub-header: context bar */}
      {state === 'results' && (
        <div style={{
          background: 'white', borderBottom: '1px solid var(--border-light)',
          padding: '10px 24px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 16,
          fontSize: '0.8rem', color: 'var(--text-secondary)',
        }}>
          <span>
            <span style={{ fontWeight: 500, color: 'var(--text)' }}>GreenChar Solutions</span>
            {' '}&mdash;{' '}
            <span className="mono" style={{ fontSize: '0.75rem' }}>PURO-2025-GCS-0042</span>
          </span>
          <span style={{ color: 'var(--border)' }}>|</span>
          <span>Puro.earth Biochar Methodology v3</span>
          <span style={{ color: 'var(--border)' }}>|</span>
          <span>
            CORCs Claimed: <span className="mono" style={{ fontWeight: 600, color: 'var(--text)' }}>82.50 tCO2e</span>
          </span>
        </div>
      )}

      <main style={{ flex: 1, paddingBottom: 40 }}>
        {state === 'submission' && <ReportSubmission onRunCheck={handleRunCheck} />}
        {state === 'loading' && <PreFlightLoading onComplete={handleLoadingComplete} />}
        {state === 'results' && (
          <ResultsIssues
            onRerun={handleRerun}
            showClean={showClean}
            onToggleClean={() => setShowClean(!showClean)}
          />
        )}
      </main>

      {/* Footer */}
      <footer style={{
        borderTop: '1px solid var(--border-light)',
        padding: '12px 24px',
        textAlign: 'center', fontSize: '0.72rem', color: 'var(--text-muted)',
        background: 'white',
      }}>
        Mangrove Audit Intelligence &mdash; Pre-Flight Check Engine v2.1 &mdash; {TOTAL_CHECKS} rules loaded from Puro.earth Biochar Methodology
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
