<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penticton → Kimberley — BC Epic 1000 Bikepacking Plan</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // All symbols and data defined in regular script to avoid Babel UTF-8 issues
    window.SYM = {
      ARROW: '\u2192', UP: '\u2191', TIMER: '\u23f1', DOWN: '\u25bc',
      BULL: '\u2022', DASH: '\u2014', DARR: '\u2193',
      TENT: '\u26fa', CART: '\ud83d\uded2', WARN: '\u26a0\ufe0f',
      BACK: '\u21a9\ufe0f', PIN: '\ud83d\udccd', DROP: '\ud83d\udca7',
      SHIP: '\u26f4\ufe0f', DEG: '\u00b0',
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a1a0f;
      --bg-secondary: #112718;
      --bg-card: #1a3322;
      --bg-card-hover: #1f3d28;
      --text-primary: #ecfdf5;
      --text-secondary: #a7f3d0;
      --text-muted: #6ee7b7;
      --accent: #34d399;
      --accent-glow: rgba(52, 211, 153, 0.15);
      --accent-secondary: #fbbf24;
      --gradient-start: #10b981;
      --gradient-end: #34d399;
      --border: rgba(134, 239, 172, 0.12);
      --danger: #f87171;
      --warning: #fbbf24;
      --success: #34d399;
      --info: #60a5fa;
      --hero-gradient: linear-gradient(135deg, #0a1a0f 0%, #112718 40%, #0a1a10 100%);
      --card-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* ========== HERO ========== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: var(--hero-gradient);
      position: relative;
      overflow: hidden;
      padding: 40px 24px;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(52, 211, 153, 0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 30%, rgba(251, 191, 36, 0.04) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-2%, 2%) rotate(1deg); }
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-badge {
      display: inline-block;
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-weight: 300;
    }
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 20px;
      max-width: 700px;
      width: 100%;
    }
    .hero-stat {
      text-align: center;
      padding: 20px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .hero-stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .hero-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .scroll-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: bounce 2s ease infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ========== SECTIONS ========== */
    section { padding: 80px 0; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 40px;
    }

    /* ========== ELEVATION PROFILE ========== */
    .elevation-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px;
      border: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .elevation-card h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .elevation-svg { width: 100%; height: auto; }
    .elevation-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ========== DAY CARDS ========== */
    .day-card {
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .day-card:hover { border-color: rgba(52, 211, 153, 0.3); }
    .day-card.expanded { border-color: var(--accent); }
    .day-header {
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .day-number {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      color: #fff;
      flex-shrink: 0;
    }
    .day-number.crux {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
    }
    .day-info { flex: 1; min-width: 0; }
    .day-route {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .day-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .day-meta span { white-space: nowrap; }
    .day-expand-icon {
      font-size: 20px;
      color: var(--text-muted);
      transition: transform 0.3s;
      flex-shrink: 0;
    }
    .day-card.expanded .day-expand-icon { transform: rotate(180deg); }
    .day-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .day-card.expanded .day-details { max-height: 2000px; }
    .day-details-inner { padding: 0 28px 28px; }

    .terrain-bar {
      height: 8px;
      border-radius: 4px;
      display: flex;
      overflow: hidden;
      margin: 16px 0 8px;
    }
    .terrain-bar div { height: 100%; }
    .terrain-legend {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .terrain-legend span::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 3px;
      margin-right: 4px;
      vertical-align: middle;
    }
    .terrain-gravel::before { background: #34d399 !important; }
    .terrain-paved::before { background: #60a5fa !important; }
    .terrain-singletrack::before { background: #f59e0b !important; }
    .terrain-fsr::before { background: #a78bfa !important; }

    .waypoint-list { margin-top: 20px; }
    .waypoint {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .waypoint:last-child { border-bottom: none; }
    .wp-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .wp-camp { background: rgba(52, 211, 153, 0.2); }
    .wp-resupply { background: rgba(96, 165, 250, 0.2); }
    .wp-hazard { background: rgba(248, 113, 113, 0.2); }
    .wp-shortcut { background: rgba(251, 191, 36, 0.2); }
    .wp-poi { background: rgba(255, 255, 255, 0.08); }
    .wp-water { background: rgba(56, 189, 248, 0.2); }
    .wp-ferry { background: rgba(167, 139, 250, 0.2); }
    .wp-name { font-weight: 600; color: var(--text-primary); }
    .wp-desc { color: var(--text-secondary); font-size: 13px; }

    .day-tip {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .day-tip.tip-warning {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: var(--warning);
    }
    .day-tip.tip-danger {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--danger);
    }
    .day-tip.tip-info {
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.2);
      color: var(--info);
    }
    .day-tip.tip-success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: var(--success);
    }
    .tip-label { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; margin-bottom: 4px; }

    /* ========== SHORTCUTS SECTION ========== */
    .shortcut-card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      padding: 24px;
      margin-bottom: 16px;
    }
    .shortcut-card h4 {
      color: var(--warning);
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .shortcut-compare {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin: 16px 0;
    }
    .shortcut-option {
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-size: 13px;
    }
    .shortcut-option.trail { background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); }
    .shortcut-option.highway { background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.2); }
    .shortcut-vs { font-weight: 700; color: var(--text-muted); font-size: 12px; }
    .shortcut-verdict {
      font-size: 13px;
      color: var(--text-secondary);
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .shortcut-verdict strong { color: var(--accent); }

    /* ========== ALERTS SECTION ========== */
    .alert-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      border-left: 4px solid;
    }
    .alert-card.alert-red { border-left-color: var(--danger); }
    .alert-card.alert-yellow { border-left-color: var(--warning); }
    .alert-card.alert-blue { border-left-color: var(--info); }
    .alert-card h4 { margin-bottom: 8px; font-size: 1rem; }
    .alert-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
    .alert-card .action-items {
      margin-top: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      font-size: 13px;
    }
    .alert-card .action-items li {
      margin-left: 16px;
      margin-bottom: 4px;
      color: var(--text-secondary);
    }

    /* ========== RESUPPLY TABLE ========== */
    .resupply-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .resupply-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .resupply-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .resupply-table tr:hover td { background: rgba(255,255,255,0.02); }
    .resupply-major { color: var(--accent) !important; font-weight: 600; }

    /* ========== GEAR CHECKLIST ========== */
    .gear-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .gear-category {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 24px;
    }
    .gear-category h4 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .gear-category li {
      font-size: 13px;
      color: var(--text-secondary);
      margin-left: 16px;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .gear-category li strong { color: var(--text-primary); }

    /* ========== FOOTER ========== */
    .footer {
      padding: 40px 0;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent); text-decoration: none; }

    /* ========== EASTER EGG ========== */
    .easy-mode-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(239,68,68,0.15));
      border: 1px solid rgba(251,191,36,0.3);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fbbf24;
      cursor: pointer;
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      letter-spacing: 0.5px;
    }
    .easy-mode-btn:hover { background: linear-gradient(135deg, rgba(251,191,36,0.25), rgba(239,68,68,0.25)); border-color: #fbbf24; transform: scale(1.03); }
    .easy-mode-btn:active { transform: scale(0.97); }
    .easter-egg-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      cursor: pointer;
      padding: 24px;
    }
    .easter-egg-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .easter-egg-overlay img {
      max-width: min(600px, 90vw);
      max-height: 70vh;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transform: scale(0.8) rotate(-2deg);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .easter-egg-overlay.visible img {
      transform: scale(1) rotate(1deg);
    }
    .easter-egg-caption {
      margin-top: 20px;
      font-size: 15px;
      color: var(--accent-secondary);
      font-weight: 600;
      letter-spacing: 1px;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease 0.3s;
    }
    .easter-egg-overlay.visible .easter-egg-caption {
      opacity: 1;
      transform: translateY(0);
    }
    .easter-egg-dismiss {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.4s ease 0.5s;
    }
    .easter-egg-overlay.visible .easter-egg-dismiss { opacity: 1; }

    /* ========== NAV ========== */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 12px 24px;
      background: rgba(10, 26, 15, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transform: translateY(-100%);
      transition: transform 0.3s;
    }
    .nav.visible { transform: translateY(0); }
    .nav-brand {
      font-weight: 700;
      font-size: 14px;
      color: var(--accent);
    }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    @media (max-width: 640px) {
      .hero-stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .day-header { padding: 16px; gap: 12px; }
      .day-details-inner { padding: 0 16px 20px; }
      .shortcut-compare { grid-template-columns: 1fr; }
      .shortcut-vs { text-align: center; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ============================

// ============================
window.TRIP_STATS = {

      { type: 'hazard', name: 'Bulldog Tunnel (km ~65)', desc: '912m long, PITCH BLACK. Logging trucks. LIGHTS REQUIRED!' },

  {

function Nav() {

function EasyMode() {

function ElevationProfile() {
  // Simplified elevation profile across 5 days
  const points = [
    // Day 1: Penticton (344m) -> Chute Lake (1265m) -> Myra (1240m) -> Beaverdell (780m)
    { x: 0, y: 344, label: 'Penticton' },
    { x: 30, y: 1265, label: 'Chute Lake' },
    { x: 65, y: 1240, label: 'McCulloch' },
    { x: 130, y: 780, label: 'Beaverdell' },
    // Day 2: -> Rock Creek (600) -> Midway (580) -> Grand Forks (520) -> Christina Lake (440)
    { x: 180, y: 600, label: '' },
    { x: 210, y: 580, label: 'Midway' },
    { x: 240, y: 520, label: 'Grand Forks' },
    { x: 270, y: 440, label: 'Christina Lk' },
    // Day 3: -> Eholt (1050) -> Farron (1200) -> Castlegar (500)
    { x: 300, y: 1050, label: '' },
    { x: 335, y: 1200, label: 'Farron' },
    { x: 380, y: 500, label: 'Castlegar' },
    // Day 4: -> Trail (440) -> Salmo (600) -> Nelson (540) -> Ferry (540)
    { x: 420, y: 440, label: 'Trail' },
    { x: 450, y: 600, label: 'Salmo' },
    { x: 470, y: 540, label: 'Nelson' },
    { x: 500, y: 540, label: 'Ferry' },
    // Day 5: -> Grey Creek Pass (2072!) -> Kimberley (1113)
    { x: 530, y: 550, label: 'Grey Ck' },
    { x: 555, y: 2072, label: 'PASS 2,072m' },
    { x: 600, y: 1113, label: 'Kimberley' },
  ];

  const svgW = 800;
  const svgH = 220;
  const padL = 45;
  const padR = 15;
  const padT = 25;
  const padB = 25;
  const chartW = svgW - padL - padR;
  const chartH = svgH - padT - padB;
  const maxKm = 600;
  const maxElev = 2200;
  const minElev = 300;

  const toX = (km) => padL + (km / maxKm) * chartW;
  const toY = (elev) => padT + chartH - ((elev - minElev) / (maxElev - minElev)) * chartH;

  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(p.x).toFixed(1)},${toY(p.y).toFixed(1)}`).join(' ');
  const areaD = pathD + ` L${toX(points[points.length-1].x).toFixed(1)},${toY(minElev).toFixed(1)} L${toX(0).toFixed(1)},${toY(minElev).toFixed(1)} Z`;

  // Day boundaries
  const dayBounds = [0, 130, 270, 380, 500, 600];
  const dayColors = ['rgba(52,211,153,0.08)', 'rgba(96,165,250,0.08)', 'rgba(52,211,153,0.08)', 'rgba(96,165,250,0.08)', 'rgba(245,158,11,0.1)'];

  return (
    <div className="elevation-card">
      <h3>Elevation Profile</h3>
      <svg className="elevation-svg" viewBox={`0 0 ${svgW} ${svgH}`}>
        {/* Day background bands */}
        {dayBounds.slice(0, -1).map((start, i) => (
          <rect key={i} x={toX(start)} y={padT} width={toX(dayBounds[i+1]) - toX(start)} height={chartH} fill={dayColors[i]} />
        ))}
        {/* Day labels */}
        {dayBounds.slice(0, -1).map((start, i) => (
          <text key={`dl${i}`} x={(toX(start) + toX(dayBounds[i+1])) / 2} y={svgH - 5} textAnchor="middle" fontSize="10" fill="#6ee7b7" fontFamily="Inter">Day {i+1}</text>
        ))}
        {/* Grid lines */}
        {[500, 1000, 1500, 2000].map(e => (
          <g key={e}>
            <line x1={padL} y1={toY(e)} x2={svgW - padR} y2={toY(e)} stroke="rgba(255,255,255,0.06)" />
            <text x={padL - 5} y={toY(e) + 3} textAnchor="end" fontSize="9" fill="#6ee7b7" fontFamily="Inter">{e}m</text>
          </g>
        ))}
        {/* Area fill */}
        <path d={areaD} fill="url(#elevGrad)" opacity="0.3" />
        {/* Line */}
        <path d={pathD} fill="none" stroke="#34d399" strokeWidth="2.5" />
        {/* Points & labels */}
        {points.filter(p => p.label).map((p, i) => (
          <g key={i}>
            <circle cx={toX(p.x)} cy={toY(p.y)} r="3" fill={p.y > 1800 ? '#f59e0b' : '#34d399'} />
            <text x={toX(p.x)} y={toY(p.y) - 8} textAnchor="middle" fontSize="8" fill={p.y > 1800 ? '#fbbf24' : '#a7f3d0'} fontWeight={p.y > 1800 ? '700' : '400'} fontFamily="Inter">{p.label}</text>
          </g>
        ))}
        <defs>
          <linearGradient id="elevGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#34d399" />
            <stop offset="100%" stopColor="#34d399" stopOpacity="0" />
          </linearGradient>
        </defs>
      </svg>
      <div className="elevation-labels">
        <span>0 km {SYM.DASH} Penticton</span>
        <span>600 km {SYM.DASH} Kimberley</span>
      </div>
    </div>
  );
}

        </div>
        <div style={{ marginTop: 20, padding: 16, background: 'var(--bg-card)', borderRadius: 12, fontSize: 13, color: 'var(--text-secondary)', border: '1px solid var(--border)' }}>
          <strong style={{ color: 'var(--warning)' }}>Longest gap without services:</strong> Grey Creek to Kimberley (~80 km). Stock up in Nelson with 2 full meals + snacks. Carry 2-3L of water for Grey Creek Pass.
        </div>
      </div>
    </section>
  );
}

function GearSection() {
  return (
    <section id="gear">
      <div className="container">
        <div className="section-label">Be Prepared</div>
        <div className="section-title">Gear Checklist</div>
        <div className="gear-grid">
          {GEAR.map((cat, i) => (
            <div className="gear-category" key={i}>
              <h4>{cat.category}</h4>
              <ul>
                {cat.items.map((item, j) => <li key={j} dangerouslySetInnerHTML={{ __html: item.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') }} />)}
              </ul>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <Nav />
      <Hero />

      <section id="itinerary">
        <div className="container">
          <div className="section-label">The Route</div>
          <div className="section-title">Day by Day</div>
          <ElevationProfile />
          {DAYS.map(d => <DayCard key={d.day} data={d} />)}
        </div>
      </section>

      <ShortcutsSection />
      <AlertsSection />
      <ResupplySection />
      <GearSection />

      <footer className="footer">
        <div className="container">
          <p>Penticton {SYM.ARROW} Kimberley {SYM.BULL} BC Epic 1000 {SYM.BULL} June 2026</p>
          <p style={{ marginTop: 8 }}>
            Route: <a href="https://www.strava.com/routes/3463368757543966168" target="_blank">Strava</a> {SYM.BULL}
            Official: <a href="https://www.bcepic1000.com/route-map" target="_blank">bcepic1000.com</a>
          </p>
          <p style={{ marginTop: 16, fontSize: 11, opacity: 0.5 }}>Built with vibes. Ride safe.</p>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
